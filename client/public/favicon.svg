<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Kayenta Explorer app icon.

    A layered red-rock mesa at dusk under a graded sunset sky with a low
    glowing sun — the Kayenta / Ivins, UT country the app is built around —
    overlaid by the app's signature white dashed "surveyor's polygon" (the
    draw-an-area-on-the-map gesture) with vertex dots. The read is a single
    high-contrast mesa silhouette + the polygon, so it survives down to 16px.
  -->
  <defs>
    <linearGradient id="kx-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1b1733"/>
      <stop offset="42%" stop-color="#3f2f63"/>
      <stop offset="70%" stop-color="#9c4f5a"/>
      <stop offset="100%" stop-color="#d98a52"/>
    </linearGradient>
    <clipPath id="kx-squircle"><rect x="0" y="0" width="1024" height="1024" rx="230"/></clipPath>
  </defs>

  <g clip-path="url(#kx-squircle)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#kx-sky)"/>

    <!-- Sun + soft halo -->
    <circle cx="660" cy="500" r="150" fill="#ffe7be" opacity="0.18"/>
    <circle cx="660" cy="500" r="110" fill="#ffe7be"/>

    <!-- Distant butte (lighter rock) -->
    <path d="M0 740 L0 660 L150 600 L150 520 L290 520 L290 600 L470 600 L470 510 L640 510 L640 580 L840 580 L840 548 L1024 548 L1024 740 Z"
          fill="#b9583a" opacity="0.92"/>

    <!-- Main mesa (mid rock) -->
    <path d="M0 1024 L0 770 L210 700 L210 640 L280 640 L280 706 L470 706 L470 600 L660 600 L660 676 L860 676 L860 642 L1024 642 L1024 1024 Z"
          fill="#7c3621"/>

    <!-- Foreground ridge (darkest) -->
    <path d="M0 1024 L0 880 L150 838 L300 880 L520 832 L700 884 L880 840 L1024 884 L1024 1024 Z"
          fill="#5a2417"/>

    <!-- Surveyor's polygon over the sky -->
    <polygon points="300,330 600,250 760,360 520,420"
             fill="none" stroke="#ffffff" stroke-width="8"
             stroke-linejoin="round" stroke-dasharray="8 13" opacity="0.96"/>
    <circle cx="300" cy="330" r="15" fill="#fff"/>
    <circle cx="600" cy="250" r="15" fill="#fff"/>
    <circle cx="760" cy="360" r="15" fill="#fff"/>
    <circle cx="520" cy="420" r="15" fill="#fff"/>
  </g>

  <!-- Subtle edge so it reads against light tab/Finder backgrounds -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="none" stroke="#1b1733" stroke-width="8" opacity="0.30"/>
</svg>
